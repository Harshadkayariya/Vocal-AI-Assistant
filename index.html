<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vocal Assistant | BS 4th Year Project</title>
    <style>
        body { background: #0f172a; color: #38bdf8; font-family: 'Segoe UI', sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .circle { width: 150px; height: 150px; background: rgba(56, 189, 248, 0.2); border: 2px solid #38bdf8; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        .circle:active { transform: scale(0.9); }
        .status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
        h1 { font-size: 1.5rem; margin-bottom: 30px; color: white; }
        p { color: #94a3b8; padding: 0 20px; }
        .wave { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(56, 189, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }
    </style>
</head>
<body>

    <h1>AI Voice Assistant</h1>
    <div class="circle" id="start-btn">
        <svg viewBox="0 0 24 24" width="60" height="60" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
    </div>
    <div class="status" id="status-text">Tap to Speak</div>
    <p id="transcript">I am listening... Try saying "Hello" or "What is the time?"</p>

    <script>
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.onstart = () => {
            btn.classList.add('wave');
            status.innerText = "Listening...";
        };

        recognition.onresult = (event) => {
            const command = event.results[0][0].transcript.toLowerCase();
            transcript.innerText = "You said: " + command;
            handleCommand(command);
        };

        recognition.onend = () => {
            btn.classList.remove('wave');
            status.innerText = "Tap to Speak Again";
        };

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function handleCommand(cmd) {
            if (cmd.includes('hello')) {
                speak("Hello! I am your AI Assistant. How can I help you today?");
            } else if (cmd.includes('time')) {
                speak("The current time is " + new Date().toLocaleTimeString());
            } else if (cmd.includes('google')) {
                speak("Opening Google for you.");
                window.open("https://www.google.com", "_blank");
            } else if (cmd.includes('github')) {
                speak("Opening your GitHub profile.");
                window.open("https://github.com", "_blank");
            } else {
                speak("I heard you say " + cmd + ". But I don't know that command yet.");
            }
        }

        btn.addEventListener('click', () => {
            recognition.start();
        });
    </script>
</body>
        </html>

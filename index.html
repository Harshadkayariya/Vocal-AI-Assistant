<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Assistant</title>
    <style>
        body { background: #0f172a; color: #38bdf8; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .circle { width: 140px; height: 140px; background: rgba(56, 189, 248, 0.1); border: 3px solid #38bdf8; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(56, 189, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }
    </style>
</head>
<body>
    <h1>Smart AI Assistant</h1>
    <div class="circle" id="start-btn">
        <svg viewBox="0 0 24 24" width="50" height="50" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z""")/>><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z""")/>></svg>
    </div>
    <p id="transcript">Tap to speak Biology or Surat</p>

    <script>
        const btn = document.getElementById('start-btn');
        const transcript = document.getElementById('transcript');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

        recognition.onstart = () => btn.classList.add('pulse');
        recognition.onend = () => btn.classList.remove('pulse');

        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            transcript.innerText = "You said: " + cmd;
            handleCommand(cmd);
        };

        function speak(text) {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        }

        function handleCommand(cmd) {
            if (cmd.includes('hello')) {
                speak("Hello! How can I help you?");
            } else if (cmd.includes('time')) {
                speak("The time is " + new Date().toLocaleTimeString());
            } else {
                speak("Searching Google for " + cmd);
                // यहाँ encodeURIComponent का इस्तेमाल हुआ है जो एरर ठीक कर देगा
                window.open("https://www.google.com" + encodeURIComponent(cmd), "_blank");
            }
        }

        btn.addEventListener('click', () => recognition.start());
    </script>
</body>
        </html>

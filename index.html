<script>
    const btn = document.getElementById('start-btn');
    const status = document.getElementById('status-text');
    const transcript = document.getElementById('transcript');

    // Speech Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Your browser does not support Voice AI. Please use Google Chrome.");
    }
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; // भाषा सेट करें

    recognition.onstart = () => {
        btn.classList.add('wave');
        status.innerText = "Listening...";
    };

    recognition.onresult = (event) => {
        // यहाँ बदलाव किया गया है: रिजल्ट निकालने का सही तरीका
        const command = event.results[0][0].transcript.toLowerCase();
        transcript.innerText = "You said: " + command;
        handleCommand(command);
    };

    recognition.onend = () => {
        btn.classList.remove('wave');
        status.innerText = "Tap to Speak Again";
    };

    function speak(text) {
        window.speechSynthesis.cancel(); // पुरानी आवाज रोकें
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function handleCommand(cmd) {
        if (cmd.includes('hello')) {
            speak("Hello! I am your AI Assistant. How can I help you today?");
        } else if (cmd.includes('time')) {
            const time = new Date().toLocaleTimeString();
            speak("The current time is " + time);
        } else if (cmd.includes('google')) {
            speak("Opening Google for you.");
            setTimeout(() => { window.open("https://www.google.com", "_blank"); }, 1000);
        } else {
            speak("I heard you say " + cmd + ". Try asking for time or say hello.");
        }
    }

    btn.addEventListener('click', () => {
        recognition.start();
    });
</script>
